<script>
const links = [
  { name: "gba-games", url: "https://gim309.github.io/gba/emulator" },
  { name: "frieren", url: "https://c.tenor.com/e4cMKVfOT9AAAAAd/tenor.gif" },

];




/* RANDOM TEXT */
function getRandomSubtitle() {
  const list = ["crums","monkey","stairs","milk","ice cream","zero"];
  return list[Math.floor(Math.random()*list.length)];
}
document.getElementById("random-sub").textContent = getRandomSubtitle();




/* THEME */
if (localStorage.getItem("theme")==="dark") {
  document.body.classList.add("dark-mode");
}




function toggleTheme(){
  document.body.classList.toggle("dark-mode");
  localStorage.setItem(
      "theme",
      document.body.classList.contains("dark-mode") ? "dark" : "light"
  );
}




/* ===================== */
/* TRUE ABOUT:BLANK MODE */
/* ===================== */
function openBlank(url){
  const win = window.open("about:blank");




  if(!win){
      alert("Allow popups");
      return;
  }




  win.document.write(`
<!DOCTYPE html>
<html>
<head>
<title></title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}
iframe {
  border: none;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<iframe src="${url}"></iframe>
</body>
</html>
  `);




  win.document.close();
}




/* SEARCH */
function distance(a,b){
  a=a.toLowerCase(); b=b.toLowerCase();
  const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));




  for(let i=0;i<=a.length;i++) dp[i][0]=i;
  for(let j=0;j<=b.length;j++) dp[0][j]=j;




  for(let i=1;i<=a.length;i++){
      for(let j=1;j<=b.length;j++){
          dp[i][j]=Math.min(
              dp[i-1][j]+1,
              dp[i][j-1]+1,
              dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
          );
      }
  }
  return dp[a.length][b.length];
}




function updateSearch(){
  const val=document.getElementById("search").value.trim();
  const box=document.getElementById("suggestions");
  box.innerHTML="";
  if(!val) return;




  const results = links
      .map(l=>({...l, score: distance(val,l.name)}))
      .sort((a,b)=>a.score-b.score)
      .slice(0,3);




  results.forEach(r=>{
      const div=document.createElement("div");
      div.textContent=r.name;
      div.onclick=()=>openBlank(r.url);
      box.appendChild(div);
  });
}
</script>
